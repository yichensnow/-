<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站维护中</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
    width:100%;
    height:100vh;
    background:#111111;
    font-family:SimSun,serif;
}
body{
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    position: relative;
}
.box{
    text-align:center;
    color:#aaaaaa;
}
h1{
    font-size:32px;
    font-weight:normal;
    margin-bottom:20px;
    color:#d4af37;
}
p{
    font-size:17px;
    line-height:1.8;
}
/* 底部页脚备案 */
footer{
    position: absolute;
    bottom: 40px;
    text-align:center;
}
footer a{
    font-size: 16px;
    color: #b868e8;
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="box">
    <h1>网站正在维护升级</h1>
    <p>本站暂时关闭访问<br>敬请耐心等候，开放时间另行通知</p>
</div>
<!-- 页脚区域 -->
<footer>
    <a href="https://icp.gov.moe/?keyword=20268188" target="_blank">萌ICP备20268188号</a>
</footer>
</body>
</html>
