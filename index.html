<script>
    // --- 菜单自动切换 ---
    document.addEventListener("DOMContentLoaded", function() {
        const wrapper = document.getElementById('menuScrollWrapper');
        const items = document.querySelectorAll('#menuScrollList li');
        let currentIndex = 0;
        let intervalId = null;
        let isPaused = false;

        function switchTo(index) {
            items.forEach(item => item.classList.remove('active'));
            items[index].classList.add('active');
            if (items[index]) {
                items[index].scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }
        function startAutoSwitch() {
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(() => {
                if (!isPaused) {
                    currentIndex = (currentIndex + 1) % items.length;
                    switchTo(currentIndex);
                }
            }, 3000);
        }
        wrapper.addEventListener('mouseenter', () => { isPaused = true; });
        wrapper.addEventListener('mouseleave', () => { isPaused = false; });
        if (items.length > 0) {
            setTimeout(() => { switchTo(0); }, 100);
            startAutoSwitch();
        }
    });

    // --- 播放器初始化（只保留一份，删除重复播放器代码）
    (function initPlayer() {
        const audio = document.getElementById('bgm');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const progressTrack = document.getElementById('progressTrack');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        let autoPlayFlag = false;

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === 0) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // 页面任意点击后自动播放（解决浏览器自动播放拦截）
        document.body.addEventListener('click', () => {
            if(!autoPlayFlag){
                audio.play().then(()=>{
                    playBtn.textContent = '⏸';
                    autoPlayFlag = true;
                }).catch(e=>{
                    document.querySelector('.track-title').textContent = '· 音乐加载失败';
                });
            }
        },{once:true})

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().then(() => { playBtn.textContent = '⏸'; autoPlayFlag=true; })
                .catch(e=>{
                    document.querySelector('.track-title').textContent = '· 音乐加载失败';
                });
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });
        audio.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatTime(audio.duration);
        });
        audio.addEventListener('timeupdate', () => {
            if (!isNaN(audio.duration) && audio.duration > 0) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeSpan.textContent = formatTime(audio.currentTime);
            }
        });
        progressTrack.addEventListener('click', (e) => {
            const rect = progressTrack.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (!isNaN(audio.duration) && audio.duration > 0) {
                audio.currentTime = percent * audio.duration;
            }
        });
        audio.addEventListener('pause', () => { playBtn.textContent = '▶'; });
        audio.addEventListener('play', () => { playBtn.textContent = '⏸'; });
        audio.addEventListener('error', () => {
            document.querySelector('.track-title').textContent = '· 音乐加载失败';
            playBtn.disabled = true;
        });
    })();

    // --- 雪花生成代码（优化，动态持续生成雪花，修复不显示问题）
    function createSnow(){
        const flakes = ['❄', '❅', '❆'];
        let flake = document.createElement('div');
        flake.className = 'snowflake';
        flake.innerText = flakes[Math.floor(Math.random()*flakes.length)];
        let size = Math.random()*14+6;
        flake.style.fontSize = size+'px';
        flake.style.left = Math.random()*100+'vw';
        flake.style.animationDuration = (Math.random()*8+5)+'s';
        document.body.appendChild(flake);
        setTimeout(()=>{flake.remove()},13000);
    }
    setInterval(createSnow,120);
</script>
